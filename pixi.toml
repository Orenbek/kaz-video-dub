[project]
name = "kaz-video-dub"
version = "0.1.0"
description = "English to Kazakh video dubbing pipeline"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = "3.11.*"
ffmpeg = ">=7.0"
numpy = ">=1.26,<3"
scipy = ">=1.13,<2"
librosa = ">=0.10,<1"
pydantic = ">=2.7,<3"
typer = ">=0.12,<1"
rich = ">=13,<14"
soundfile = ">=0.12,<1"
srt = ">=3.5,<4"
pytorch = ">=2.4,<3"
torchaudio = ">=2.4,<3"
pyyaml = ">=6,<7"

[pypi-dependencies]
whisperx = "*"
pyannote-audio = "*"
google-genai = "*"
python-dotenv = "*"
pytest = "*"
ruff = "*"
mypy = "*"

[tasks]
run = "python -m video_dub.cli run"
transcribe = "python -m video_dub.cli transcribe"
translate = "python -m video_dub.cli translate"
tts = "python -m video_dub.cli tts"
compose = "python -m video_dub.cli compose"
test = "pytest"
lint = "ruff check src tests"
fmt = "ruff format src tests"
typecheck = "mypy src"
