[workspace]
name = "kaz-video-dub"
version = "0.1.0"
description = "English to Kazakh video dubbing pipeline"
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = "3.11.*"
ffmpeg = ">=7.0"
numpy = ">=1.26,<3"
scipy = ">=1.13,<2"
librosa = ">=0.10,<1"
pydantic = ">=2.7,<3"
typer = ">=0.12,<1"
rich = ">=13,<14"
srt = ">=3.5,<4"
pytorch = ">=2.5.1,<2.6"
torchaudio = ">=2.5.1,<2.6"
pyyaml = ">=6,<7"
pytest = "*"
ruff = "*"
mypy = "*"
pyright = "*"

[pypi-dependencies]
whisperx = ">=3.4.5,<3.5"
pyannote-audio = ">=3.3.2,<4"
google-genai = "*"
python-dotenv = "*"
soundfile = ">=0.12,<1"
huggingface-hub = ">=0.21,<0.26"
transformers = ">=4.30,<5"
kaz-video-dub = { path = ".", editable = true }

[tasks]
run = "video-dub run"
transcribe = "video-dub transcribe"
translate = "video-dub translate"
diarize = "video-dub diarize"
tts = "video-dub tts"
compose = "video-dub compose"
test = "pytest"
lint = "ruff check src tests"
fmt = "ruff format src tests"
typecheck = "mypy src"
pyright = "pyright"
