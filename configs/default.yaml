# Base run output directory. Each pipeline execution creates a timestamped job folder here.
run_root: runs
# Source transcript language.
source_language: en
# Target dubbing language.
target_language: kk
# Subtitle output language.
subtitle_language: zh

audio:
  # Audio extracted from source video is normalized to this sample rate.
  sample_rate: 16000
  # Audio extracted from source video is normalized to this channel count.
  channels: 1

transcription:
  # Transcription backend: whisperx or mlx_whisper.
  provider: whisperx
  # WhisperX model identifier.
  model_name: large-v3
  # MLX Whisper HF repo or local model path.
  mlx_model_name: mlx-community/whisper-large-v3-turbo

tts:
  # Legacy/default voice name passed to the TTS provider.
  voice: Kore
  # Optional per-speaker Gemini prebuilt voice map. Segment speaker labels come from diarization.
  gemini_voice_names:
    SPEAKER_00: Kore
    SPEAKER_01: Charon
  # Optional Gemini TTS prompt preamble. When unset, the provider uses a Kazakh dubbing prompt.
  gemini_prompt_preamble:
  # TTS model identifier.
  model_name: gemini-3.1-flash-tts-preview
  # Output sample rate for synthesized TTS WAV files.
  sample_rate: 24000
  # Retry count for transient TTS provider failures.
  max_retries: 3
  # Delay between TTS retry attempts in seconds.
  retry_delay_seconds: 1.0
  # Per-request timeout for Gemini TTS API calls in seconds. Set null to use SDK defaults.
  request_timeout_seconds: 120.0

tts_alignment:
  # Master switch for segment-level duration measurement and alignment metadata.
  enabled: true
  # Preferred duration window around target_duration. 0.12 means 88%~112% is considered preferred.
  preferred_ratio_tolerance: 0.12
  # Acceptable duration window around target_duration. 0.25 means 75%~125% is still acceptable.
  max_ratio_tolerance: 0.25
  # Allow bounded acoustic time-stretch during TTS alignment when it clearly improves fit.
  enable_time_stretch: true
  # Maximum absolute time-stretch adjustment. 0.30 means at most +/-30% duration adjustment.
  # Gemini TTS often needs moderate compression; larger mismatches should go to repair.
  max_time_stretch_ratio: 0.30
  # Minimum absolute error reduction required before applying time-stretch in non-collision cases.
  # Example: 0.05 means stretch is skipped unless it improves duration fit by at least 50ms.
  min_time_stretch_improvement_seconds: 0.05
  # If synthesized speech ends early, allow compose stage to pad trailing silence up to target duration.
  pad_with_silence: true
  # Allow small timeline overhang past the next segment start before treating it as a collision.
  allow_minor_overhang_seconds: 0.25
  # Allow compose stage to remove detected trailing silence to resolve small collisions.
  trim_trailing_silence: true
  # Upper bound on how much detected trailing silence may be removed from a segment.
  max_trailing_silence_trim_seconds: 1.0
  # If timing remains unsafe after allowed corrections, mark the segment for manual review instead of failing silently.
  manual_review_on_failure: true

video:
  # Subtitle mux mode for final video packaging: soft keeps a selectable subtitle track,
  # hard burns subtitles into the video frames.
  subtitle_mode: soft

diarization:
  # Speaker diarization pipeline identifier.
  model_name: pyannote/speaker-diarization-3.1
  # Device used by WhisperX's pyannote diarization wrapper.
  device: cpu
  # Optional exact speaker count hint. Set both num_speakers and max_speakers to 1
  # to skip diarization for known single-speaker material.
  num_speakers:
  # Optional lower speaker count hint.
  min_speakers:
  # Optional upper speaker count hint.
  max_speakers:

translation:
  # Translation backend identifier.
  provider: gemini
  # Translation model identifier.
  model_name: gemini-flash-latest
  # Retry count for transient translation provider failures.
  max_retries: 3
  # Delay between translation retry attempts in seconds.
  retry_delay_seconds: 1.0
  # Per-request timeout for Gemini translation API calls in seconds. Set null to use SDK defaults.
  request_timeout_seconds: 60.0
