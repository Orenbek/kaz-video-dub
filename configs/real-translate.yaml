# Real provider config for translation and TTS. No stub providers are used.
run_root: runs
source_language: en
target_language: kk
subtitle_language: zh

translation:
  provider: gemini
  use_stub: false
  model_name: gemini-flash-latest
  max_retries: 3
  retry_delay_seconds: 1.0

tts:
  use_stub: false
  model_name: gemini-3.1-flash-tts-preview
  voice: Kore
  gemini_voice_names:
    SPEAKER_00: Kore
    SPEAKER_01: Charon
  gemini_prompt_preamble:
  sample_rate: 24000
  max_retries: 3
  retry_delay_seconds: 1.0

diarization:
  model_name: pyannote/speaker-diarization-3.1
  device: cpu
  num_speakers:
  min_speakers:
  max_speakers:
